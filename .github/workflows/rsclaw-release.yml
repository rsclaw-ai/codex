# rsclaw fork release workflow.
#
# Self-contained, GitHub-hosted-runner-only release for the codex binary.
# Independent from the upstream rust-release.yml (which requires OpenAI's
# self-hosted runner pool). Triggered by tags shaped as `rsclaw-vX.Y.Z`.
#
# Produces 6 archives, each containing the `codex` binary plus LICENSE,
# NOTICE, and SOURCE.txt (Apache-2.0 §4 compliance):
#   codex-rsclaw-vX.Y.Z-aarch64-apple-darwin.tar.gz
#   codex-rsclaw-vX.Y.Z-x86_64-apple-darwin.tar.gz
#   codex-rsclaw-vX.Y.Z-aarch64-unknown-linux-gnu.tar.gz
#   codex-rsclaw-vX.Y.Z-x86_64-unknown-linux-gnu.tar.gz
#   codex-rsclaw-vX.Y.Z-aarch64-pc-windows-msvc.zip
#   codex-rsclaw-vX.Y.Z-x86_64-pc-windows-msvc.zip

name: rsclaw-release

on:
  push:
    tags:
      - "rsclaw-v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. rsclaw-v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    defaults:
      run:
        working-directory: codex-rs
    # Heavy memory savings so github-hosted runners can compile the
    # codex-rs workspace (100+ crates) without OOM during link.
    # Upstream release profile uses lto="fat" which 14-16 GB runners
    # cannot link. Override profile knobs via env so we don't touch
    # Cargo.toml (keeps sync with upstream clean).
    env:
      CARGO_PROFILE_RELEASE_LTO: "off"
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
      CARGO_PROFILE_RELEASE_DEBUG: "false"
      CARGO_PROFILE_RELEASE_INCREMENTAL: "false"
      CARGO_BUILD_JOBS: "2"
      CARGO_NET_RETRY: "10"
      RUSTFLAGS: "-C debuginfo=0 -C strip=symbols"
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-15
            archive: tar.gz
            binary: codex
          # Cross-compile to Intel macOS from Apple Silicon runner.
          # macos-13 (Intel host) free runner pool is severely backed up
          # (jobs stuck queued >75 min). macos-15 is Apple Silicon and the
          # SDK targets both arches, so `--target x86_64-apple-darwin`
          # produces an Intel binary natively without QEMU.
          - target: x86_64-apple-darwin
            os: macos-15
            archive: tar.gz
            binary: codex
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            archive: tar.gz
            binary: codex
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive: tar.gz
            binary: codex
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            binary: codex.exe
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            archive: zip
            binary: codex.exe

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            codex-rs/target
          key: rsclaw-cargo-${{ matrix.target }}-${{ hashFiles('codex-rs/Cargo.lock') }}

      - name: Build
        shell: bash
        run: cargo build --release --target ${{ matrix.target }} --bin codex

      - name: Stage archive contents
        shell: bash
        run: |
          set -euo pipefail
          stage="stage/${{ matrix.target }}"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$stage/${{ matrix.binary }}"
          cp "${GITHUB_WORKSPACE}/LICENSE" "$stage/LICENSE"
          cp "${GITHUB_WORKSPACE}/NOTICE"  "$stage/NOTICE"
          cat > "$stage/SOURCE.txt" <<EOF
          This binary is built from rsclaw-ai/codex,
          a fork of openai/codex (Apache-2.0).

          Upstream: https://github.com/openai/codex
          Fork:     https://github.com/rsclaw-ai/codex
          Version:  ${{ steps.ver.outputs.version }}
          Target:   ${{ matrix.target }}
          Commit:   ${GITHUB_SHA}
          License:  Apache-2.0 (see LICENSE, NOTICE)

          This is a third-party build. No affiliation with OpenAI.
          EOF

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd "stage/${{ matrix.target }}"
          tar czf "${GITHUB_WORKSPACE}/codex-${{ steps.ver.outputs.version }}-${{ matrix.target }}.tar.gz" \
            "${{ matrix.binary }}" LICENSE NOTICE SOURCE.txt

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          # cwd is codex-rs/ (defaults.run.working-directory), so use a
          # relative path. Prefixing with codex-rs/ doubles the path.
          $stage = "stage/${{ matrix.target }}"
          $out   = "$env:GITHUB_WORKSPACE/codex-${{ steps.ver.outputs.version }}-${{ matrix.target }}.zip"
          Compress-Archive -Path "$stage/${{ matrix.binary }}", "$stage/LICENSE", "$stage/NOTICE", "$stage/SOURCE.txt" `
            -DestinationPath $out

      # Only run smoke test where host arch matches target arch. The
      # x86_64-apple-darwin target now cross-compiles on the arm64
      # macos-15 runner, which would need Rosetta to execute the
      # binary -- skip rather than gamble on runner config.
      - name: Smoke test (native runner only)
        if: matrix.target == 'aarch64-apple-darwin' || matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-unknown-linux-gnu' || matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: |
          set -euo pipefail
          # cwd is codex-rs/, stage/ is relative to it.
          bin="stage/${{ matrix.target }}/${{ matrix.binary }}"
          chmod +x "$bin" 2>/dev/null || true
          "./$bin" --version || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-${{ matrix.target }}
          path: codex-${{ steps.ver.outputs.version }}-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: always() && !cancelled() && needs.build.result == 'success'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          sha256sum codex-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/codex-*
            artifacts/SHA256SUMS.txt
